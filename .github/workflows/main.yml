name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  ci-stage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Image Locally for Scanning
        uses: docker/build-push-action@v4
        with:
          context: ./app
          load: true  
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/swarm-app:${{ github.sha }}

      - name: Security Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_HUB_USERNAME }}/swarm-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore  
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Push Verified Image to Docker Hub
        uses: docker/build-push-action@v4
        with:
          context: ./app
          push: true 
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/swarm-app:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/swarm-app:${{ github.sha }}

  cd-stage:
    needs: ci-stage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to Swarm via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: github.sha
          script: |
            # Update the image in the stack file and deploy
            export DOCKER_HUB_USERNAME=${{ secrets.DOCKER_HUB_USERNAME }}
            export IMAGE_TAG=${{ github.sha }}
            
            # Create a small script to deploy on the manager
            docker stack deploy -c docker-stack.yml --with-registry-auth myswarm