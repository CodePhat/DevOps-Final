global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets:
        - '172.31.33.128:9100'
        - '172.31.38.104:9100'
        - '172.31.34.1:9100'
